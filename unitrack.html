<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UniTrack — Your Unified Media Library</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --surface3: #22223a;
  --border: #2a2a40;
  --border-bright: #3a3a58;
  --text: #f0eeff;
  --text-muted: #8882aa;
  --text-dim: #4a4668;
  --accent: #c084fc;
  --accent2: #818cf8;
  --accent3: #34d399;
  --accent-glow: rgba(192,132,252,0.15);
  --danger: #f87171;
  --warning: #fbbf24;

  --cat-anime: #f472b6;
  --cat-manga: #60a5fa;
  --cat-manhwa: #a78bfa;
  --cat-book: #34d399;
  --cat-kdrama: #fb923c;
  --cat-movie: #facc15;
  --cat-custom: #94a3b8;

  --radius: 14px;
  --radius-sm: 8px;
  --radius-lg: 20px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-accent: 0 0 40px rgba(192,132,252,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  overflow: hidden;
}

/* Ambient background */
body::before {
  content: '';
  position: fixed;
  top: -200px; left: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(192,132,252,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -200px; right: -200px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(129,140,248,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ===== SIDEBAR ===== */
#sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 24px 14px;
  gap: 4px;
  position: relative;
  z-index: 10;
  overflow-y: auto;
}

.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 1.5rem;
  color: var(--text);
  padding: 0 10px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
  letter-spacing: -0.02em;
}
.logo span {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav-label {
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  padding: 12px 10px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.18s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  position: relative;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-glow); color: var(--accent); }
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 2.5px;
  background: var(--accent);
  border-radius: 2px;
}
.nav-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.nav-count {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  color: var(--text-dim);
  background: var(--surface3);
  padding: 1px 6px;
  border-radius: 20px;
}

.sidebar-footer {
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.stats-mini {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.stat-mini {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 10px;
  text-align: center;
}
.stat-mini-val {
  font-family: 'DM Mono', monospace;
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--accent);
  display: block;
}
.stat-mini-label {
  font-size: 0.6rem;
  color: var(--text-dim);
  margin-top: 2px;
  display: block;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ===== MAIN ===== */
#main {
  flex: 1;
  overflow-y: auto;
  position: relative;
  z-index: 1;
}

/* ===== TOPBAR ===== */
#topbar {
  position: sticky;
  top: 0;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  z-index: 50;
}
.topbar-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  flex: 1;
}
.search-wrap {
  position: relative;
  flex: 1;
  max-width: 320px;
}
.search-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 0.85rem;
}
#search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 0.82rem;
  padding: 9px 12px 9px 34px;
  outline: none;
  transition: border-color 0.2s;
}
#search-input:focus { border-color: var(--accent); }
#search-input::placeholder { color: var(--text-dim); }

.btn-primary {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 18px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Syne', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.18s, transform 0.18s;
  white-space: nowrap;
}
.btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }

.view-toggle {
  display: flex;
  gap: 4px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 4px;
}
.view-btn {
  padding: 5px 10px;
  border: none;
  background: none;
  color: var(--text-dim);
  border-radius: 5px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.15s;
}
.view-btn.active { background: var(--surface3); color: var(--text); }

/* ===== CONTENT ===== */
#content { padding: 28px 32px; }

/* ===== SECTION HEADER ===== */
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.section-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.section-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.25rem;
  color: var(--text);
}
.section-count {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--text-dim);
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 20px;
}
.section-add {
  margin-left: auto;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  font-family: 'Syne', sans-serif;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.15s;
}
.section-add:hover { border-color: var(--accent); color: var(--accent); }

/* ===== MEDIA GRID ===== */
.media-section { margin-bottom: 48px; }

.media-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 16px;
}

.media-grid.list-view {
  grid-template-columns: 1fr;
  gap: 8px;
}

/* ===== MEDIA CARD ===== */
.media-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  position: relative;
  animation: cardIn 0.3s ease both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.media-card:hover {
  transform: translateY(-4px);
  border-color: var(--border-bright);
  box-shadow: var(--shadow);
}

.card-cover {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  display: block;
  background: var(--surface2);
}
.card-cover-placeholder {
  width: 100%;
  aspect-ratio: 2/3;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
}

.card-body { padding: 10px 11px 12px; }
.card-title {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 5px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.3;
}
.card-meta {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.progress-bar {
  height: 3px;
  background: var(--surface3);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}
.progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease;
}
.progress-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--text-dim);
}

.status-badge {
  position: absolute;
  top: 8px; right: 8px;
  font-size: 0.58rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 3px 7px;
  border-radius: 20px;
  backdrop-filter: blur(8px);
}
.status-watching { background: rgba(52,211,153,0.2); color: var(--accent3); }
.status-completed { background: rgba(129,140,248,0.2); color: var(--accent2); }
.status-planning { background: rgba(148,163,184,0.15); color: var(--text-muted); }
.status-paused { background: rgba(251,191,36,0.2); color: var(--warning); }
.status-dropped { background: rgba(248,113,113,0.15); color: var(--danger); }

/* List view card */
.media-grid.list-view .media-card {
  display: flex;
  align-items: center;
  gap: 14px;
}
.media-grid.list-view .card-cover,
.media-grid.list-view .card-cover-placeholder {
  width: 48px;
  aspect-ratio: unset;
  height: 64px;
  border-radius: 6px;
  flex-shrink: 0;
}
.media-grid.list-view .card-body {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 0;
}
.media-grid.list-view .card-title {
  flex: 1;
  -webkit-line-clamp: 1;
  margin-bottom: 0;
}
.media-grid.list-view .progress-bar { width: 120px; margin-bottom: 0; }
.media-grid.list-view .status-badge { position: static; }
.media-grid.list-view .card-meta { margin-bottom: 0; }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}
.empty-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
.empty-text { font-size: 0.82rem; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-overlay.hidden { display: none; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 28px;
  animation: slideUp 0.25s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: var(--shadow-accent), var(--shadow);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.4rem;
  margin-bottom: 6px;
}
.modal-subtitle {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-bottom: 24px;
}

.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 0.85rem;
  padding: 10px 13px;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--text-dim); }
.form-select option { background: var(--surface); }
.form-textarea { resize: vertical; min-height: 70px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.cat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.cat-option {
  padding: 10px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 0.75rem;
  font-weight: 600;
}
.cat-option:hover { border-color: var(--border-bright); }
.cat-option.selected { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); }
.cat-emoji { font-size: 1.3rem; display: block; margin-bottom: 4px; }

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}
.btn-ghost {
  flex: 1;
  padding: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  font-family: 'Syne', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-ghost:hover { border-color: var(--border-bright); color: var(--text); }
.btn-primary-full {
  flex: 2;
  padding: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Syne', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-primary-full:hover { opacity: 0.88; }

/* ===== AI PANEL ===== */
.ai-panel {
  background: linear-gradient(135deg, rgba(192,132,252,0.06), rgba(129,140,248,0.06));
  border: 1px solid rgba(192,132,252,0.2);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 16px;
}
.ai-panel-title {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.ai-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.ai-text {
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.5;
}
.ai-loading { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-muted); }
.ai-spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== DETAIL MODAL ===== */
.detail-modal {
  max-width: 640px;
}
.detail-header {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}
.detail-cover {
  width: 100px;
  flex-shrink: 0;
  border-radius: 10px;
  overflow: hidden;
}
.detail-cover img, .detail-cover-placeholder {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  background: var(--surface2);
}
.detail-info { flex: 1; }
.detail-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.4rem;
  margin-bottom: 6px;
  line-height: 1.2;
}
.detail-cat-badge {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 3px 9px;
  border-radius: 20px;
  margin-bottom: 10px;
}
.detail-meta-row {
  display: flex;
  gap: 16px;
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  flex-wrap: wrap;
}

.progress-section { margin: 20px 0; }
.progress-section-title {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.ep-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  max-height: 160px;
  overflow-y: auto;
}
.ep-btn {
  width: 30px; height: 30px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  cursor: pointer;
  transition: all 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ep-btn:hover { border-color: var(--border-bright); color: var(--text); }
.ep-btn.done { background: var(--accent); border-color: var(--accent); color: #fff; }

.status-select-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.status-option {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  font-size: 0.72rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  background: none;
  color: var(--text-muted);
  font-family: 'Syne', sans-serif;
}
.status-option.sel-watching { border-color: var(--accent3); color: var(--accent3); background: rgba(52,211,153,0.1); }
.status-option.sel-completed { border-color: var(--accent2); color: var(--accent2); background: rgba(129,140,248,0.1); }
.status-option.sel-planning { border-color: var(--text-muted); color: var(--text); background: rgba(148,163,184,0.1); }
.status-option.sel-paused { border-color: var(--warning); color: var(--warning); background: rgba(251,191,36,0.1); }
.status-option.sel-dropped { border-color: var(--danger); color: var(--danger); background: rgba(248,113,113,0.1); }

.detail-actions {
  display: flex;
  gap: 8px;
  margin-top: 20px;
}
.btn-danger {
  padding: 9px 16px;
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.3);
  color: var(--danger);
  border-radius: var(--radius-sm);
  font-family: 'Syne', sans-serif;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-danger:hover { background: rgba(248,113,113,0.2); }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

/* ===== TOAST ===== */
#toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--surface2);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-sm);
  padding: 12px 18px;
  font-size: 0.82rem;
  color: var(--text);
  z-index: 999;
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: var(--shadow);
}
#toast.show { transform: translateY(0); opacity: 1; }

/* ===== FILTER ROW ===== */
.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.filter-chip {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  font-size: 0.72rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  background: none;
  color: var(--text-muted);
  font-family: 'Syne', sans-serif;
}
.filter-chip:hover { border-color: var(--border-bright); color: var(--text); }
.filter-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 24px 0; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="logo">Uni<span>Track</span></div>

  <div class="nav-label">Library</div>
  <button class="nav-item active" onclick="filterCategory('all', this)">
    <span>🎭</span> All Media
    <span class="nav-count" id="count-all">0</span>
  </button>
  <button class="nav-item" onclick="filterCategory('Anime', this)">
    <span class="nav-dot" style="background:var(--cat-anime)"></span> Anime
    <span class="nav-count" id="count-Anime">0</span>
  </button>
  <button class="nav-item" onclick="filterCategory('Manga', this)">
    <span class="nav-dot" style="background:var(--cat-manga)"></span> Manga
    <span class="nav-count" id="count-Manga">0</span>
  </button>
  <button class="nav-item" onclick="filterCategory('Manhwa', this)">
    <span class="nav-dot" style="background:var(--cat-manhwa)"></span> Manhwa
    <span class="nav-count" id="count-Manhwa">0</span>
  </button>
  <button class="nav-item" onclick="filterCategory('K-Drama', this)">
    <span class="nav-dot" style="background:var(--cat-kdrama)"></span> K-Drama
    <span class="nav-count" id="count-K-Drama">0</span>
  </button>
  <button class="nav-item" onclick="filterCategory('Movie', this)">
    <span class="nav-dot" style="background:var(--cat-movie)"></span> Movies
    <span class="nav-count" id="count-Movie">0</span>
  </button>
  <button class="nav-item" onclick="filterCategory('Book', this)">
    <span class="nav-dot" style="background:var(--cat-book)"></span> Books
    <span class="nav-count" id="count-Book">0</span>
  </button>

  <div class="sidebar-footer">
    <div class="stats-mini">
      <div class="stat-mini">
        <span class="stat-mini-val" id="stat-total">0</span>
        <span class="stat-mini-label">Total</span>
      </div>
      <div class="stat-mini">
        <span class="stat-mini-val" id="stat-watching">0</span>
        <span class="stat-mini-label">Watching</span>
      </div>
      <div class="stat-mini">
        <span class="stat-mini-val" id="stat-completed">0</span>
        <span class="stat-mini-label">Done</span>
      </div>
      <div class="stat-mini">
        <span class="stat-mini-val" id="stat-planning">0</span>
        <span class="stat-mini-label">Planned</span>
      </div>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div class="topbar-title" id="topbar-title">All Media</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search your library..." oninput="handleSearch(this.value)"/>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" onclick="setView('grid', this)" title="Grid">⊞</button>
      <button class="view-btn" onclick="setView('list', this)" title="List">≡</button>
    </div>
    <button class="btn-primary" onclick="openAddModal()">＋ Add Media</button>
  </div>

  <div id="content">
    <div class="filter-row" id="filter-row">
      <button class="filter-chip active" onclick="filterStatus('all', this)">All</button>
      <button class="filter-chip" onclick="filterStatus('Watching', this)">Watching</button>
      <button class="filter-chip" onclick="filterStatus('Completed', this)">Completed</button>
      <button class="filter-chip" onclick="filterStatus('Planning', this)">Planning</button>
      <button class="filter-chip" onclick="filterStatus('Paused', this)">Paused</button>
      <button class="filter-chip" onclick="filterStatus('Dropped', this)">Dropped</button>
    </div>
    <div id="media-container"></div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay hidden" id="add-modal">
  <div class="modal">
    <div class="modal-title">Add to Library</div>
    <div class="modal-subtitle">Track something new across your media universe.</div>

    <div class="form-group">
      <label class="form-label">Category</label>
      <div class="cat-grid" id="cat-grid">
        <div class="cat-option selected" onclick="selectCat('Anime', this)"><span class="cat-emoji">🎌</span>Anime</div>
        <div class="cat-option" onclick="selectCat('Manga', this)"><span class="cat-emoji">📖</span>Manga</div>
        <div class="cat-option" onclick="selectCat('Manhwa', this)"><span class="cat-emoji">🌸</span>Manhwa</div>
        <div class="cat-option" onclick="selectCat('K-Drama', this)"><span class="cat-emoji">🇰🇷</span>K-Drama</div>
        <div class="cat-option" onclick="selectCat('Movie', this)"><span class="cat-emoji">🎬</span>Movie</div>
        <div class="cat-option" onclick="selectCat('Book', this)"><span class="cat-emoji">📚</span>Book</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Title</label>
      <input type="text" class="form-input" id="add-title" placeholder="e.g. Solo Leveling, Crash Landing on You..." oninput="onTitleInput(this.value)"/>
    </div>

    <div id="ai-fetch-panel" class="ai-panel" style="display:none;">
      <div class="ai-panel-title"><div class="ai-dot"></div>AI Metadata</div>
      <div id="ai-fetch-content" class="ai-loading">
        <div class="ai-spinner"></div> Fetching details...
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Total Episodes / Chapters</label>
        <input type="number" class="form-input" id="add-total" placeholder="e.g. 24" min="1"/>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="add-status">
          <option value="Planning">Planning</option>
          <option value="Watching">Watching</option>
          <option value="Completed">Completed</option>
          <option value="Paused">Paused</option>
          <option value="Dropped">Dropped</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Cover Image URL <span style="color:var(--text-dim);font-weight:400;text-transform:none;">(optional)</span></label>
      <input type="url" class="form-input" id="add-cover" placeholder="https://..."/>
    </div>

    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn-primary-full" onclick="addMedia()">Add to Library ✦</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay hidden" id="detail-modal">
  <div class="modal detail-modal" id="detail-modal-inner"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ===== DATA =====
let library = JSON.parse(localStorage.getItem('unitrack_library') || '[]');
let currentCat = 'all';
let currentStatus = 'all';
let currentView = 'grid';
let searchQuery = '';
let selectedCat = 'Anime';
let aiTimer = null;

const CAT_COLORS = {
  'Anime': 'var(--cat-anime)',
  'Manga': 'var(--cat-manga)',
  'Manhwa': 'var(--cat-manhwa)',
  'K-Drama': 'var(--cat-kdrama)',
  'Movie': 'var(--cat-movie)',
  'Book': 'var(--cat-book)',
};
const CAT_EMOJI = {
  'Anime': '🎌', 'Manga': '📖', 'Manhwa': '🌸',
  'K-Drama': '🇰🇷', 'Movie': '🎬', 'Book': '📚',
};
const STATUS_CLASS = {
  'Watching': 'status-watching', 'Completed': 'status-completed',
  'Planning': 'status-planning', 'Paused': 'status-paused', 'Dropped': 'status-dropped'
};

function save() {
  localStorage.setItem('unitrack_library', JSON.stringify(library));
}

// ===== RENDER =====
function getFiltered() {
  return library.filter(m => {
    const catOk = currentCat === 'all' || m.category === currentCat;
    const statusOk = currentStatus === 'all' || m.status === currentStatus;
    const searchOk = !searchQuery || m.title.toLowerCase().includes(searchQuery.toLowerCase());
    return catOk && statusOk && searchOk;
  });
}

function render() {
  updateCounts();
  const items = getFiltered();
  const container = document.getElementById('media-container');

  if (items.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">📭</span>
        <div class="empty-text">Nothing here yet.<br>Add something to start tracking.</div>
      </div>`;
    return;
  }

  // Group by category if showing all
  if (currentCat === 'all' && !searchQuery) {
    const cats = ['Anime','Manga','Manhwa','K-Drama','Movie','Book'];
    let html = '';
    cats.forEach(cat => {
      const catItems = items.filter(m => m.category === cat);
      if (!catItems.length) return;
      html += `
        <div class="media-section">
          <div class="section-header">
            <div class="section-dot" style="background:${CAT_COLORS[cat]}"></div>
            <div class="section-title">${cat}</div>
            <div class="section-count">${catItems.length}</div>
          </div>
          <div class="media-grid ${currentView === 'list' ? 'list-view' : ''}">
            ${catItems.map(m => cardHTML(m)).join('')}
          </div>
        </div>`;
    });
    container.innerHTML = html;
  } else {
    container.innerHTML = `
      <div class="media-grid ${currentView === 'list' ? 'list-view' : ''}">
        ${items.map(m => cardHTML(m)).join('')}
      </div>`;
  }
}

function cardHTML(m) {
  const pct = m.total > 0 ? Math.round((m.progress / m.total) * 100) : 0;
  const color = CAT_COLORS[m.category] || 'var(--accent)';
  const coverEl = m.cover
    ? `<img class="card-cover" src="${m.cover}" alt="${m.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    + `<div class="card-cover-placeholder" style="display:none">${CAT_EMOJI[m.category]||'🎭'}</div>`
    : `<div class="card-cover-placeholder">${CAT_EMOJI[m.category]||'🎭'}</div>`;

  if (currentView === 'list') {
    return `<div class="media-card" onclick="openDetail('${m.id}')">
      ${m.cover ? `<img class="card-cover" src="${m.cover}" alt="" onerror="this.style.display='none'">` : `<div class="card-cover-placeholder">${CAT_EMOJI[m.category]||'🎭'}</div>`}
      <div class="card-body">
        <div class="card-title">${m.title}</div>
        <div class="card-meta">${m.category}</div>
        <div class="progress-bar" style="width:120px"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="card-meta">${m.progress}/${m.total||'?'}</div>
        <span class="status-badge ${STATUS_CLASS[m.status]||''}">${m.status}</span>
      </div>
    </div>`;
  }

  return `<div class="media-card" onclick="openDetail('${m.id}')">
    <div class="status-badge ${STATUS_CLASS[m.status]||''}">${m.status}</div>
    ${coverEl}
    <div class="card-body">
      <div class="card-title">${m.title}</div>
      <div class="card-meta">${m.category}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="progress-label">${m.progress} / ${m.total||'?'} ${pct > 0 ? '· '+pct+'%' : ''}</div>
    </div>
  </div>`;
}

function updateCounts() {
  const cats = ['Anime','Manga','Manhwa','K-Drama','Movie','Book'];
  document.getElementById('count-all').textContent = library.length;
  cats.forEach(c => {
    const el = document.getElementById('count-'+c);
    if (el) el.textContent = library.filter(m => m.category === c).length;
  });
  document.getElementById('stat-total').textContent = library.length;
  document.getElementById('stat-watching').textContent = library.filter(m=>m.status==='Watching').length;
  document.getElementById('stat-completed').textContent = library.filter(m=>m.status==='Completed').length;
  document.getElementById('stat-planning').textContent = library.filter(m=>m.status==='Planning').length;
}

// ===== FILTERS =====
function filterCategory(cat, el) {
  currentCat = cat;
  document.querySelectorAll('#sidebar .nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('topbar-title').textContent = cat === 'all' ? 'All Media' : cat;
  render();
}

function filterStatus(status, el) {
  currentStatus = status;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function handleSearch(q) {
  searchQuery = q;
  render();
}

function setView(v, el) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ===== ADD MODAL =====
function openAddModal() {
  document.getElementById('add-modal').classList.remove('hidden');
  document.getElementById('add-title').value = '';
  document.getElementById('add-total').value = '';
  document.getElementById('add-cover').value = '';
  document.getElementById('add-status').value = 'Planning';
  document.getElementById('ai-fetch-panel').style.display = 'none';
  selectCat('Anime', document.querySelector('.cat-option'));
}

function closeAddModal() {
  document.getElementById('add-modal').classList.add('hidden');
  clearTimeout(aiTimer);
}

function selectCat(cat, el) {
  selectedCat = cat;
  document.querySelectorAll('.cat-option').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

let aiDebounce = null;
function onTitleInput(val) {
  clearTimeout(aiDebounce);
  if (val.length < 3) {
    document.getElementById('ai-fetch-panel').style.display = 'none';
    return;
  }
  aiDebounce = setTimeout(() => fetchAIMeta(val), 800);
}

async function fetchAIMeta(title) {
  const panel = document.getElementById('ai-fetch-panel');
  const content = document.getElementById('ai-fetch-content');
  panel.style.display = 'block';
  content.innerHTML = `<div class="ai-loading"><div class="ai-spinner"></div> Looking up "${title}"...</div>`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 400,
        messages: [{
          role: "user",
          content: `You are a media database assistant. For the ${selectedCat} titled "${title}", provide a brief structured response.

Return ONLY a JSON object with these fields (no markdown, no extra text):
{
  "found": true/false,
  "title": "official title",
  "total": number (total episodes/chapters/pages, or 0 if unknown),
  "status": "Ongoing" or "Completed" or "Unknown",
  "genre": "genre1, genre2",
  "year": number or null,
  "summary": "one sentence description, max 100 chars"
}

If you don't recognize it, set found: false and estimate what you can.`
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '{}';
    let meta;
    try { meta = JSON.parse(text.replace(/```json|```/g,'').trim()); }
    catch { meta = { found: false }; }

    if (meta.found) {
      content.innerHTML = `
        <div style="font-size:0.8rem;color:var(--text);font-weight:600;margin-bottom:4px;">${meta.title || title}</div>
        <div style="font-size:0.72rem;color:var(--text-muted);margin-bottom:6px;">${meta.summary || ''}</div>
        <div style="display:flex;gap:12px;font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--text-dim);flex-wrap:wrap;">
          ${meta.total ? `<span>📊 ${meta.total} eps/ch</span>` : ''}
          ${meta.status ? `<span>📡 ${meta.status}</span>` : ''}
          ${meta.genre ? `<span>🏷 ${meta.genre}</span>` : ''}
          ${meta.year ? `<span>📅 ${meta.year}</span>` : ''}
        </div>`;
      if (meta.total && !document.getElementById('add-total').value) {
        document.getElementById('add-total').value = meta.total;
      }
    } else {
      content.innerHTML = `<div class="ai-text" style="color:var(--text-dim);">Couldn't find metadata — fill in details manually.</div>`;
    }
  } catch (e) {
    content.innerHTML = `<div class="ai-text" style="color:var(--text-dim);">AI lookup unavailable. Fill in manually.</div>`;
  }
}

function addMedia() {
  const title = document.getElementById('add-title').value.trim();
  if (!title) { toast('Please enter a title!'); return; }

  const total = parseInt(document.getElementById('add-total').value) || 0;
  const status = document.getElementById('add-status').value;
  const cover = document.getElementById('add-cover').value.trim();

  const item = {
    id: Date.now().toString(),
    title,
    category: selectedCat,
    total,
    progress: status === 'Completed' ? total : 0,
    status,
    cover,
    episodes: Array(total).fill(false),
    added: new Date().toISOString()
  };

  library.unshift(item);
  save();
  render();
  closeAddModal();
  toast(`✦ "${title}" added to your library`);
}

// ===== DETAIL MODAL =====
function openDetail(id) {
  const m = library.find(x => x.id === id);
  if (!m) return;

  const color = CAT_COLORS[m.category] || 'var(--accent)';
  const pct = m.total > 0 ? Math.round((m.progress/m.total)*100) : 0;

  const coverEl = m.cover
    ? `<img src="${m.cover}" style="width:100%;aspect-ratio:2/3;object-fit:cover;" onerror="this.style.display='none'">`
    : `<div style="width:100%;aspect-ratio:2/3;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:3rem;">${CAT_EMOJI[m.category]||'🎭'}</div>`;

  const statuses = ['Watching','Completed','Planning','Paused','Dropped'];
  const statusBtns = statuses.map(s =>
    `<button class="status-option ${m.status===s?'sel-'+s.toLowerCase():''}" onclick="updateStatus('${id}','${s}',this)">${s}</button>`
  ).join('');

  let epSection = '';
  if (m.total > 0) {
    const epBtns = Array.from({length: m.total}, (_,i) =>
      `<button class="ep-btn ${m.episodes[i]?'done':''}" onclick="toggleEp('${id}',${i},this)">${i+1}</button>`
    ).join('');
    epSection = `
      <div class="progress-section">
        <div class="progress-section-title">Episode / Chapter Progress</div>
        <div style="margin-bottom:10px;">
          <div class="progress-bar" style="height:5px;margin-bottom:6px">
            <div class="progress-fill" style="width:${pct}%;background:${color}"></div>
          </div>
          <div style="font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--text-muted);">${m.progress} / ${m.total} · ${pct}%</div>
        </div>
        <div class="ep-grid">${epBtns}</div>
      </div>`;
  }

  document.getElementById('detail-modal-inner').innerHTML = `
    <div class="detail-header">
      <div class="detail-cover" style="border-radius:10px;overflow:hidden;">${coverEl}</div>
      <div class="detail-info">
        <div class="detail-title">${m.title}</div>
        <div class="detail-cat-badge" style="background:${color}22;color:${color};">${CAT_EMOJI[m.category]} ${m.category}</div>
        <div class="detail-meta-row">
          ${m.total ? `<span>📊 ${m.total} total</span>` : ''}
          <span>📅 ${new Date(m.added).toLocaleDateString('en-US',{month:'short',year:'numeric'})}</span>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="progress-section-title">Status</div>
    <div class="status-select-row">${statusBtns}</div>

    ${epSection}

    <div class="detail-actions">
      <button class="btn-danger" onclick="deleteMedia('${id}')">🗑 Remove</button>
      <button class="btn-primary-full" onclick="closeDetailModal()" style="flex:2;">Done</button>
    </div>`;

  document.getElementById('detail-modal').classList.remove('hidden');
}

function closeDetailModal() {
  document.getElementById('detail-modal').classList.add('hidden');
}

function toggleEp(id, idx, btn) {
  const m = library.find(x => x.id === id);
  if (!m) return;
  if (!m.episodes) m.episodes = Array(m.total).fill(false);
  m.episodes[idx] = !m.episodes[idx];
  m.progress = m.episodes.filter(Boolean).length;
  if (m.progress === m.total && m.total > 0) m.status = 'Completed';
  else if (m.progress > 0) m.status = 'Watching';
  btn.classList.toggle('done');
  save();
  render();
  // refresh detail progress
  const pct = m.total > 0 ? Math.round((m.progress/m.total)*100) : 0;
  const color = CAT_COLORS[m.category] || 'var(--accent)';
  const bar = document.querySelector('.detail-modal .progress-fill');
  const label = document.querySelector('.detail-modal .progress-section > div > div:last-child');
  if (bar) bar.style.width = pct + '%';
  if (label) label.textContent = `${m.progress} / ${m.total} · ${pct}%`;
}

function updateStatus(id, status, btn) {
  const m = library.find(x => x.id === id);
  if (!m) return;
  m.status = status;
  if (status === 'Completed' && m.total > 0) {
    m.progress = m.total;
    m.episodes = Array(m.total).fill(true);
  }
  save();
  render();
  document.querySelectorAll('.status-option').forEach(b => {
    b.className = 'status-option';
  });
  btn.className = 'status-option sel-' + status.toLowerCase();
}

function deleteMedia(id) {
  if (!confirm('Remove from library?')) return;
  library = library.filter(x => x.id !== id);
  save();
  render();
  closeDetailModal();
  toast('Removed from library');
}

// ===== TOAST =====
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ===== CLICK OUTSIDE =====
document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('add-modal')) closeAddModal();
});
document.getElementById('detail-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('detail-modal')) closeDetailModal();
});

// ===== SAMPLE DATA =====
if (library.length === 0) {
  library = [
    { id:'1', title:'Solo Leveling', category:'Manhwa', total:179, progress:179, status:'Completed', cover:'', episodes:Array(179).fill(true), added: new Date().toISOString() },
    { id:'2', title:'Crash Landing on You', category:'K-Drama', total:16, progress:10, status:'Watching', cover:'', episodes:[...Array(10).fill(true),...Array(6).fill(false)], added: new Date().toISOString() },
